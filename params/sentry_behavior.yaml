combat_sentry_behavior_server:
  ros__parameters:
    use_sim_time: true
    action_name: combat_sentry_behavior         # Optional
    tick_frequency: 5                          # Optional (defaults to 100 Hz)
    groot2_port: 1667                           # Optional (defaults to 1667)
    ros_plugins_timeout: 1000                   # Optional (defaults 1000 ms)
    use_cout_logger: false                      # Optional (defaults to false)
    nav_goal_topic: goal_pose
    nav_plan_topic: plan
    nav_action_name: navigate_to_pose

    plugins:
      - combat_sentry_behavior/bt_plugins

    behavior_trees:
      - combat_sentry_behavior/behavior_trees

    CalculateAttackPose:
      attack_radius: 3.0
      num_sectors: 36
      cost_threshold: 50
      robot_base_frame: base_footprint
      visualize: true
      transform_tolerance: 0.5
      max_visualization_distance: 4.0
      marker_scale_base: 0.3

    CheckTargetInRegion:
      min_x: 4.5
      max_x: 6.0
      min_y: 8.5
      max_y: 10.0
      target_frame: map
      transform_tolerance: 0.5

combat_sentry_behavior_client:
  ros__parameters:
    use_sim_time: true
    target_tree: rmul_2026_no_attack

    # rmul_2026
